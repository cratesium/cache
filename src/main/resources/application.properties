# ═══════════════════════════════════════════════════════════════
# Application
# ═══════════════════════════════════════════════════════════════
spring.application.name=app
spring.profiles.active=dev


# ═══════════════════════════════════════════════════════════════
# MySQL (JPA / Hibernate)
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/primary_db
spring.datasource.username=app_user
spring.datasource.password=app_password!222qD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL strategy
# update  = auto-alter schema (dev)
# validate = just check schema (prod) – switch via profile
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true


# ═══════════════════════════════════════════════════════════════
# Redis (Cache)
# ═══════════════════════════════════════════════════════════════
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000


# ═══════════════════════════════════════════════════════════════
# Kafka
# ═══════════════════════════════════════════════════════════════
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=cache-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


# ═══════════════════════════════════════════════════════════════
# JWT
# ═══════════════════════════════════════════════════════════════
# Secret must be at least 256 bits (32 chars) for HS256.
# In production load from vault / env var: ${JWT_SECRET}
jwt.secret=mySecretKeyForDevOnlyReplaceInProd1234567890!!
# Token validity: 24 hours (in milliseconds)
jwt.expiration-ms=86400000


# ═══════════════════════════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.com.kafka.shikhar.app=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.redis=INFO
# Show bound SQL parameter values (dev only)
logging.level.org.hibernate.orm.jdbc.bind=TRACE